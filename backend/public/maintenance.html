<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareT - Reconnecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ffc107;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .retry-info {
            font-size: 13px;
            color: #999;
            margin-top: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            animation: progress 3s ease-in-out infinite;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }
            50% {
                width: 70%;
            }
            100% {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 24px;
            }

            p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔄</div>
        <h1>Reconnecting to ShareT</h1>
        <p>The server is briefly restarting or recovering. Your shared links are safe and will be available in a moment.</p>
        
        <div class="spinner"></div>
        
        <div class="status">
            <span class="status-dot"></span>
            <span id="status-text">Establishing connection...</span>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <div class="retry-info">
            This page will automatically refresh when the server is ready.
        </div>
    </div>

    <script>
        let retryCount = 0;
        const maxRetries = 60; // 5 minutes (5 seconds × 60)
        const statusMessages = [
            'Establishing connection...',
            'Checking server status...',
            'Almost there...',
            'Reconnecting...',
            'Server is starting up...'
        ];

        function updateStatus() {
            const statusText = document.getElementById('status-text');
            statusText.textContent = statusMessages[retryCount % statusMessages.length];
        }

        async function checkServer() {
            try {
                const response = await fetch('/health', {
                    method: 'GET',
                    cache: 'no-cache'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'healthy') {
                        // Server is back! Redirect to home
                        window.location.href = '/';
                        return;
                    }
                }
            } catch (error) {
                // Server not ready yet
            }

            retryCount++;
            updateStatus();

            if (retryCount < maxRetries) {
                // Retry after 5 seconds
                setTimeout(checkServer, 5000);
            } else {
                // After 5 minutes, show error
                document.getElementById('status-text').textContent = 'Taking longer than expected. Please refresh manually.';
                document.querySelector('.status-dot').style.background = '#dc3545';
            }
        }

        // Start checking immediately
        checkServer();
    </script>
</body>
</html>
